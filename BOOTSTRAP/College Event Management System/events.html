<!DOCTYPE html>
<html>

<head>
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <div class="container my-5">

        <h1 class="text-center mb-4">Upcoming Events</h1>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card">
                    <img src="images/quiz.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Technical Quiz</h5>
                        <p>Date: 10 Aug</p>
                        <p>Venue: Seminar Hall</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="images/hack.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Hackathon</h5>
                        <p>Date: 12 Aug</p>
                        <p>Venue: Lab 1</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="images/poster1.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Poster Presentation</h5>
                        <p>Date: 14 Aug</p>
                        <p>Venue: Block A</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="images/coding.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Coding Contest</h5>
                        <p>Date: 15 Aug</p>
                        <p>Venue: Lab 2</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="images/project.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Project Expo</h5>
                        <p>Date: 16 Aug</p>
                        <p>Venue: Auditorium</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="images/fest.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Cultural Fest</h5>
                        <p>Date: 18 Aug</p>
                        <p>Venue: Open Ground</p>
                        <button class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

</body>

</html>
