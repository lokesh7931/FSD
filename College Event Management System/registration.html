<!DOCTYPE html>
<html>

<head>
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <div class="container my-5">

        <h2>Event Registration</h2>

        <form>

            <input type="text" class="form-control mb-3" placeholder="Student Name">

            <input type="text" class="form-control mb-3" placeholder="Roll Number">

            <input type="text" class="form-control mb-3" placeholder="Branch">

            <input type="email" class="form-control mb-3" placeholder="Email">

            <input type="tel" class="form-control mb-3" placeholder="Mobile Number">

            <select class="form-select mb-3">
                <option>Technical Quiz</option>
                <option>Hackathon</option>
                <option>Coding Contest</option>
            </select>

            <button class="btn btn-success">
                Submit
            </button>

        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
