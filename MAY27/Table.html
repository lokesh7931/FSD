<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <table border="1" align="center">
        <tr align="center">
            <th>Time</th>
            <th>9:00-10:00</th>
            <th>10:00-11:00</th>
            <th>11:00-11:10</th>
            <th>11:10-12:10</th>
        </tr>

        <tr align="center">
            <td>MON</td>
            <td colspan="4">FSD</td>
        </tr>

        <tr align="center">
            <td>TUE</td>
            <td colspan="2">FSD</td>
            <td rowspan="3">BREAK</td>
            <td>LAB</td>
        </tr>


        <tr align="center">
            <td>WED</td>
            <td colspan="2">LAB</td>
            <td>FSD</td>
        </tr>

        <tr align="center">
            <td>THU</td>
            <td colspan="2">FSD</td>
            <td>LAB</td>
        </tr>

        <tr align="center">
            <td>FRI</td>
            <td colspan="4">LAB</td>
        </tr>

        <tr align="center">
            <td>SAT</td>
            <td colspan="2">FSD</td>
            <td>Break</td>
            <td>LAB</td>
        </tr>


    </table>

</body>

</html>
