<!DOCTYPE html>
<html>

<head>
    <title>Survey</title>
</head>

<body>

    <h1>Society Survey</h1>

    <form>


        <label for="clean">Cleanliness Satisfaction : </label>
        <select name="clean">
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <br><br>

        <label for="maintainance">Security Service Feedback : </label>

        <input type="radio" name="maintainance"> Satisfied
        <input type="radio" name="maintainance"> Need Improvement

        <br><br>

        <label for="parking">Parking Issues</label> <br>

        <textarea rows="4" cols="30" name="parking" placeholder="Describe parking issues"></textarea>

        <br><br>


        <label for="water">Water Supply Feedback</label> <br>
        <textarea rows="4" cols="30" name="water" placeholder="Share water supply feedback"></textarea>

        <br><br>



        <label for="maintainance">Maintenance Quality</label>
        <input type="radio" name="maintenance"> Good
        <input type="radio" name="maintenance"> Average
        <input type="radio" name="maintenance"> Poor

        <br><br>


        <label for="suggest">Suggestions Box </label><br>
        <textarea rows="5" cols="30" name="suggest" placeholder="Enter your suggestions"></textarea>

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>

</html>
