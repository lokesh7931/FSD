<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>

    <style>
        .example {
            background-color: red;
            width: 200px;
            height: 400px;
            transition: background-color 0.5s ease 2s, width 5s, height 0.1s;
        }

        .example:hover {
            background-color: yellow;
            width: 400px;
            height: 800px;
        }
    </style>

</head>

<body>

    <div class="example">
        EXAMPLE
    </div>

</body>

</html>
