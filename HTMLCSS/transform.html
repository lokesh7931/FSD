<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;

        }

        .example {
            background-color: red;
            border: 2px solid black;
            width: 200px;
            height: 300px;
            margin: 100px;
            transform-origin: left;
        }

        .example:hover {
            transform: rotate(45deg);
        }

        .example2 {
            background-color: blue;
            border: 2px solid black;
            width: 200px;
            height: 300px;
            margin: 100px;

        }

        .example2:hover {
            transform: translate(50px, 40px)
        }

        .example3 {
            background-color: yellow;
            border: 2px solid black;
            width: 200px;
            height: 300px;
            margin: 100px;
        }

        .example3:hover {
            transform: scale(1.5);
        }


        .example4 {
            background-color: green;
            border: 2px solid black;
            width: 200px;
            height: 300px;
            margin: 100px;
        }

        .example4:hover {
            transform: skew(-10deg);
        }
    </style>

</head>
<div class="container">
    <div class="example">
        Transform
    </div>

    <div class="example2">
        Transform
    </div>

    <div class="example3">
        Transform
    </div>

    <div class="example4">
        Transform
    </div>

</div>

<body>

</body>

</html>
