<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
</head>

<body>

    <h1>Contact / Help</h1>

    <form>

        <label for="fullname">Name</label>
        <input type="text" name="fullname" id="fullname" placeholder="Enter Your Name"><br><br>

        <label for="emailid">Email ID</label>
        <input type="email" name="emailid" id="emailid" placeholder="Enter Your Email"><br><br>

        <label for="subject">Subject</label>
        <input type="text" name="subject" id="subject" placeholder="Enter Subject"><br><br>

        <label for="message">Message</label><br>
        <textarea rows="5" cols="30" name="message" id="message" placeholder="Enter Your Message"></textarea><br><br>

        <button type="submit">Submit</button>

    </form>

    <hr>

    <h3>Society Office Details</h3>

    <p>Address: ABC Residency, Hyderabad</p>
    <p>Email: society@gmail.com</p>
    <p>Phone: 9876543210</p>
    <p>Office Timings: 9:00 AM - 6:00 PM</p>

</body>

</html>
