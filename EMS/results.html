<!DOCTYPE html>
<html>

<head>
    <title>Results</title>

    <style>
        .box {
            text-align: center;
        }

        .table1 {
            margin: auto;
            border-collapse: collapse;
        }

        th {
            padding: 10px;
        }

        td {
            padding: 10px;
        }
    </style>
</head>


<body>

    <div class="box">

        <h1>Election Results</h1>

        <table class="table1" border="1">

            <tr>
                <th>Candidate Name</th>
                <th>Votes Received</th>
                <th>Vote Percentage</th>
            </tr>

            <tr>
                <td>Rahul Kumar</td>
                <td>120</td>
                <td>60%</td>
            </tr>

            <tr>
                <td>Priya Sharma</td>
                <td>80</td>
                <td>40%</td>
            </tr>

        </table>

        <br>

        <h2>Winner: Rahul Kumar</h2>

    </div>

</body>

</html>
