<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>

    <form>

        <h1>Registration Form</h1>

        <label for="fullName">Full Name</label>
        <input type="text" name="fullName" id="fullName" placeholder="Enter the Full Name"> <br><br>

        <label for="hno">Flat/House Number</label>
        <input type="text" name="hno" id="hno" placeholder="Enter the Flat/House No"> <br><br>

        <label for="emailid">Email Id</label>
        <input type="email" name="emailid" id="emailid" placeholder="Enter the Email Id"> <br><br>

        <label for="pno">Phone Number</label>
        <input type="tel" name="pno" id="hno" placeholder="Enter the Phone No"> <br><br>

        <label for="pass">Password</label>
        <input type="password" name="pass" id="pass" placeholder="Enter the Password"> <br><br>

        <label for="conpass">Gonfirm Password</label>
        <input type="password" name="conpass" id="conpass" placeholder="Confirm Password"> <br><br>

        <label for="resi">Resident Type</label>
        <input type="radio" name="resi" id="resiown" value="owner">Owner
        <input type="radio" name="resi" id="resiten" value="tenant">Tenant <br><br>

        <button>Register</button>

    </form>


</body>

</html>
